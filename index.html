<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Harnois – Demande de soumission</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2d6a4f;
  --green-light: #40916c;
  --green-pale: #d8f3dc;
  --green-bg: #f0faf3;
  --dark: #1b1b1b;
  --mid: #4a4a4a;
  --light: #f7f7f5;
  --border: #dde8e1;
  --white: #ffffff;
  --accent: #e76f51;
  --shadow: 0 2px 12px rgba(45,106,79,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--dark);
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--dark);
  color: white;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 32px;
  max-width: 1600px;
  margin: 0 auto;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--green-pale);
  white-space: nowrap;
}
.logo span { color: var(--accent); }
.search-wrap {
  flex: 1;
  position: relative;
  max-width: 600px;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 44px;
  border: 2px solid transparent;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
.search-wrap input:focus {
  background: rgba(255,255,255,0.15);
  border-color: var(--green-light);
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 16px;
}
.cart-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--green);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: background 0.2s;
  position: relative;
}
.cart-btn:hover { background: var(--green-light); }
.cart-count {
  background: var(--accent);
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
}

/* LAYOUT */
.layout {
  display: flex;
  max-width: 1600px;
  margin: 0 auto;
  min-height: calc(100vh - 64px);
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: white;
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}
.sidebar-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  padding: 0 20px 12px;
}
.section-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  text-align: left;
  padding: 9px 20px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--mid);
  transition: all 0.15s;
  gap: 8px;
}
.section-btn:hover {
  background: var(--green-bg);
  color: var(--green);
}
.section-btn.active {
  background: var(--green-pale);
  color: var(--green);
  font-weight: 600;
  border-right: 3px solid var(--green);
}
.section-btn .count {
  background: var(--border);
  color: var(--mid);
  border-radius: 12px;
  padding: 1px 7px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  min-width: 28px;
  text-align: center;
}
.section-btn.active .count {
  background: var(--green-light);
  color: white;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 28px 32px;
  overflow: hidden;
}
.section-header {
  margin-bottom: 20px;
}
.section-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
  color: var(--green);
}
.section-header p {
  font-size: 13px;
  color: var(--mid);
  margin-top: 4px;
}
.results-info {
  font-size: 13px;
  color: var(--mid);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.results-info strong { color: var(--dark); }

/* PRODUCT TABLE */
.product-table {
  width: 100%;
  background: white;
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.product-table table {
  width: 100%;
  border-collapse: collapse;
}
.product-table th {
  background: var(--dark);
  color: rgba(255,255,255,0.7);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 12px 16px;
  text-align: left;
}
.product-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
.product-table td {
  padding: 11px 16px;
  font-size: 13px;
  vertical-align: middle;
}
.product-table tr:hover td { background: var(--green-bg); }
.code-cell {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--green);
  font-weight: 500;
  white-space: nowrap;
}
.name-cell {
  font-weight: 500;
  color: var(--dark);
}
.desc-cell {
  color: var(--mid);
  font-size: 12px;
}
.unit-cell {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--mid);
  text-align: center;
}
.qty-cell {
  width: 90px;
}
.qty-cell input {
  width: 70px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.qty-cell input:focus { border-color: var(--green-light); }
.add-btn {
  padding: 6px 14px;
  background: var(--green-pale);
  color: var(--green);
  border: 1px solid var(--green-light);
  border-radius: 5px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
}
.add-btn:hover {
  background: var(--green);
  color: white;
  border-color: var(--green);
}
.add-btn.added {
  background: var(--green);
  color: white;
  border-color: var(--green);
}

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.page-btn {
  padding: 7px 13px;
  border: 1px solid var(--border);
  background: white;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--mid);
  transition: all 0.15s;
}
.page-btn:hover { border-color: var(--green-light); color: var(--green); }
.page-btn.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
  font-weight: 600;
}
.page-btn:disabled {
  opacity: 0.4;
  cursor: default;
}

/* CART PANEL */
.cart-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  justify-content: flex-end;
}
.cart-overlay.open { display: flex; }
.cart-panel {
  background: white;
  width: 460px;
  max-width: 100vw;
  height: 100%;
  overflow-y: auto;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: -4px 0 40px rgba(0,0,0,0.15);
}
.cart-panel h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
  color: var(--green);
}
.cart-close {
  position: absolute;
  top: 20px;
  right: 28px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--mid);
}
.cart-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--green-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-code {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--green);
  font-weight: 500;
}
.cart-item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--dark);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cart-qty-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cart-qty-wrap input {
  width: 55px;
  padding: 5px 6px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  text-align: center;
  outline: none;
}
.cart-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #c9184a;
  font-size: 16px;
  padding: 4px;
  border-radius: 4px;
  transition: background 0.15s;
}
.cart-remove:hover { background: #ffe0e9; }
.cart-empty {
  text-align: center;
  color: var(--mid);
  padding: 40px 0;
  font-size: 14px;
}

/* QUOTE FORM */
.quote-form {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.quote-form h4 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
  color: var(--dark);
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--mid);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  background: var(--light);
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--green-light); background: white; }
.form-group textarea { resize: vertical; min-height: 80px; }
.submit-btn {
  padding: 14px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  transition: background 0.2s;
  width: 100%;
}
.submit-btn:hover { background: var(--green-light); }
.no-products {
  text-align: center;
  padding: 60px 20px;
  color: var(--mid);
}
.no-products h3 { font-size: 18px; margin-bottom: 8px; }

/* SUCCESS */
.success-msg {
  display: none;
  background: var(--green-pale);
  border: 1px solid var(--green-light);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  color: var(--green);
  font-weight: 500;
}

@media (max-width: 900px) {
  .sidebar { display: none; }
  .layout { flex-direction: column; }
  .main { padding: 16px; }
  .header-inner { padding: 10px 16px; flex-wrap: wrap; gap: 12px; }
  .logo { font-size: 22px; }
  .cart-panel { width: 100vw; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">SERRES<span>&nbsp;HARNOIS</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher par code, nom ou description…" autocomplete="off">
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Ma sélection
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="mainContent"></main>
</div>

<!-- Cart Overlay -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCartOnBg(event)">
  <div class="cart-panel" id="cartPanel">
    <button class="cart-close" onclick="closeCart()">✕</button>
    <h3>📋 Ma sélection</h3>
    <div id="cartItems"></div>
    <div class="quote-form" id="quoteForm">
      <h4>Demande de soumission</h4>
      <div class="form-group">
        <label>Nom complet *</label>
        <input type="text" id="fName" placeholder="Jean Tremblay">
      </div>
      <div class="form-group">
        <label>Entreprise</label>
        <input type="text" id="fCompany" placeholder="Les Serres XYZ">
      </div>
      <div class="form-group">
        <label>Courriel *</label>
        <input type="email" id="fEmail" placeholder="jean@example.com">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="fPhone" placeholder="450-555-1234">
      </div>
      <div class="form-group">
        <label>Notes / commentaires</label>
        <textarea id="fNotes" placeholder="Indiquez toute information supplémentaire…"></textarea>
      </div>
      <div class="success-msg" id="successMsg">
        ✅ Votre demande de soumission a été envoyée! Un représentant vous contactera sous peu.
      </div>
      <button class="submit-btn" onclick="submitQuote()">ENVOYER LA DEMANDE</button>
    </div>
  </div>
</div>

// State
let currentSection = null;
let searchQuery = '';
let currentPage = 1;
const PER_PAGE = 50;
let cart = {};

// Build sections
const sectionCounts = {};
PRODUCTS.forEach(p => {
  sectionCounts[p.sectionLabel] = (sectionCounts[p.sectionLabel] || 0) + 1;
});
const sections = Object.keys(sectionCounts).sort();

// Render sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  let html = '<div class="sidebar-title">Sections du catalogue</div>';
  html += `<button class="section-btn ${currentSection === null ? 'active' : ''}" onclick="selectSection(null)">
    <span>🔎 Tous les produits</span>
    <span class="count">${PRODUCTS.length}</span>
  </button>`;
  sections.forEach(s => {
    const active = currentSection === s;
    html += `<button class="section-btn ${active ? 'active' : ''}" onclick="selectSection('${s.replace(/'/g, "\'")}')">
      <span>${s}</span>
      <span class="count">${sectionCounts[s]}</span>
    </button>`;
  });
  nav.innerHTML = html;
}

function selectSection(s) {
  currentSection = s;
  currentPage = 1;
  renderSidebar();
  renderProducts();
}

// Filter products
function getFiltered() {
  let items = PRODUCTS;
  if (currentSection) items = items.filter(p => p.sectionLabel === currentSection);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(p =>
      p.code.toLowerCase().includes(q) ||
      p.name.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q)
    );
  }
  return items;
}

// Render products
function renderProducts() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  currentPage = Math.min(currentPage, totalPages || 1);
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  const title = currentSection || (searchQuery ? `Résultats pour "${searchQuery}"` : 'Tous les produits');
  
  let html = `<div class="section-header">
    <h2>${title}</h2>
    <p>Catalogue Serres Harnois — Équipements de serre</p>
  </div>`;

  html += `<div class="results-info">
    <strong>${total.toLocaleString()}</strong> produit${total !== 1 ? 's' : ''}
    &nbsp;·&nbsp; Page ${currentPage} / ${totalPages || 1}
  </div>`;

  if (page.length === 0) {
    html += `<div class="no-products"><h3>Aucun produit trouvé</h3><p>Essayez un autre terme de recherche.</p></div>`;
  } else {
    html += `<div class="product-table"><table>
      <thead><tr>
        <th>Code</th>
        <th>Nom</th>
        <th>Description</th>
        <th style="text-align:center">Unité</th>
        <th>Qté</th>
        <th>Action</th>
      </tr></thead>
      <tbody>`;
    page.forEach(p => {
      const inCart = cart[p.code] !== undefined;
      const qty = inCart ? cart[p.code].qty : 1;
      html += `<tr>
        <td class="code-cell">${p.code}</td>
        <td class="name-cell">${p.name}</td>
        <td class="desc-cell">${p.description !== p.name ? p.description : ''}</td>
        <td class="unit-cell">${p.unit}</td>
        <td class="qty-cell"><input type="number" min="1" value="${qty}" id="qty-${p.code.replace(/[^a-zA-Z0-9]/g,'_')}" onchange="updateQty('${p.code}', this.value)"></td>
        <td><button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart('${p.code}', '${p.name.replace(/'/g,"\'")}', '${p.unit}')">
          ${inCart ? '✓ Ajouté' : '+ Sélectionner'}
        </button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    html += renderPagination(totalPages);
  }

  document.getElementById('mainContent').innerHTML = html;
}

function renderPagination(totalPages) {
  if (totalPages <= 1) return '';
  let html = '<div class="pagination">';
  html += `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}>← Préc.</button>`;
  
  let pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages = [1, 2];
    if (currentPage > 4) pages.push('...');
    for (let i = Math.max(3, currentPage-1); i <= Math.min(totalPages-2, currentPage+1); i++) pages.push(i);
    if (currentPage < totalPages - 3) pages.push('...');
    pages.push(totalPages-1, totalPages);
    pages = [...new Set(pages)];
  }
  
  pages.forEach(p => {
    if (p === '...') html += `<span style="padding:7px 8px;color:var(--mid)">…</span>`;
    else html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="changePage(${p})">${p}</button>`;
  });
  
  html += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}>Suiv. →</button>`;
  html += '</div>';
  return html;
}

function changePage(p) {
  currentPage = p;
  renderProducts();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Cart functions
function addToCart(code, name, unit) {
  const qtyEl = document.getElementById('qty-' + code.replace(/[^a-zA-Z0-9]/g,'_'));
  const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
  cart[code] = { code, name, unit, qty };
  updateCartCount();
  renderProducts();
}

function updateQty(code, val) {
  if (cart[code]) {
    cart[code].qty = parseInt(val) || 1;
    renderCart();
  }
}

function removeFromCart(code) {
  delete cart[code];
  updateCartCount();
  renderCart();
  renderProducts();
}

function updateCartCount() {
  const count = Object.keys(cart).length;
  document.getElementById('cartCount').textContent = count;
}

function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('open');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
}

function closeCartOnBg(e) {
  if (e.target === document.getElementById('cartOverlay')) closeCart();
}

function renderCart() {
  const items = Object.values(cart);
  const container = document.getElementById('cartItems');
  if (items.length === 0) {
    container.innerHTML = '<div class="cart-empty">🛒 Aucun produit sélectionné<br><small>Ajoutez des produits depuis le catalogue.</small></div>';
    document.getElementById('quoteForm').style.display = 'none';
    return;
  }
  document.getElementById('quoteForm').style.display = 'flex';
  let html = '';
  items.forEach(item => {
    html += `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-code">${item.code}</div>
        <div class="cart-item-name">${item.name}</div>
      </div>
      <div class="cart-qty-wrap">
        <input type="number" min="1" value="${item.qty}" onchange="updateCartQty('${item.code}', this.value)">
        <span style="font-size:11px;color:var(--mid)">${item.unit}</span>
      </div>
      <button class="cart-remove" onclick="removeFromCart('${item.code}')">🗑</button>
    </div>`;
  });
  container.innerHTML = html;
}

function updateCartQty(code, val) {
  if (cart[code]) cart[code].qty = parseInt(val) || 1;
}

function submitQuote() {
  const name = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  if (!name || !email) { alert('Veuillez entrer votre nom et courriel.'); return; }
  const items = Object.values(cart);
  if (items.length === 0) { alert('Veuillez sélectionner au moins un produit.'); return; }
  
  // Build mailto
  let body = `Demande de soumission - Serres Harnois\n\n`;
  body += `NOM: ${name}\n`;
  body += `COMPAGNIE: ${document.getElementById('fCompany').value}\n`;
  body += `COURRIEL: ${email}\n`;
  body += `TÉLÉPHONE: ${document.getElementById('fPhone').value}\n\n`;
  body += `PRODUITS DEMANDÉS:\n`;
  body += `${'-'.repeat(40)}\n`;
  items.forEach(i => { body += `${i.code}  |  ${i.name}  |  Qté: ${i.qty} ${i.unit}\n`; });
  body += `${'-'.repeat(40)}\n\n`;
  body += `NOTES: ${document.getElementById('fNotes').value}`;
  
  const subject = encodeURIComponent('Demande de soumission - ' + name);
  const bodyEnc = encodeURIComponent(body);
  window.location.href = `mailto:pieces@harnois.com?subject=${subject}&body=${bodyEnc}`;
  
  document.getElementById('successMsg').style.display = 'block';
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  currentPage = 1;
  if (searchQuery) currentSection = null;
  renderSidebar();
  renderProducts();
});

// Init
renderSidebar();
renderProducts();
</script>
</body>
